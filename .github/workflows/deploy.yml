name: Build · Test · Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  TF_DIR: infra
  TF_IN_AUTOMATION: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bumble_bff_test
          POSTGRES_USER: bumble
          POSTGRES_PASSWORD: bumble
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/bumble_bff_test
          DATABASE_USER: bumble
          DATABASE_PASSWORD: bumble
          JWT_SECRET: test-secret-at-least-32-characters-long
        run: ./gradlew test --no-daemon

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

  terraform-bootstrap-dev:
    name: Terraform Bootstrap → dev
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (dev)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/dev"

      - name: Terraform apply bootstrap (dev)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file="envs/dev/terraform.tfvars" \
            -var="project_id=${PROJECT_ID}" \
            -var="image_tag=bootstrap" \
            -target=google_project_service.artifact_registry_api \
            -target=google_artifact_registry_repository.bff

  build-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: terraform-bootstrap-dev
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bumble-bff/api
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker pull ${{ env.IMAGE }}:latest || true
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: build-push
    environment: dev
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (dev)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/dev"

      - name: Terraform apply (dev)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file="envs/dev/terraform.tfvars" \
            -var="project_id=${PROJECT_ID}" \
            -var="image_tag=${{ github.sha }}"

      - name: Capture deployed URL
        id: dev-url
        working-directory: ${{ env.TF_DIR }}
        run: echo "url=$(terraform output -raw cloud_run_url)" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed dev service
        run: bash ./scripts/cloud_smoke_upload.sh "${{ steps.dev-url.outputs.url }}"

  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT_PROD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (prod)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/prod"

      - name: Terraform apply (prod)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file="envs/prod/terraform.tfvars" \
            -var="project_id=${PROJECT_ID}" \
            -var="image_tag=${{ github.sha }}"

      - name: Capture deployed URL
        id: prod-url
        working-directory: ${{ env.TF_DIR }}
        run: echo "url=$(terraform output -raw cloud_run_url)" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed prod service
        run: bash ./scripts/cloud_smoke_upload.sh "${{ steps.prod-url.outputs.url }}"
