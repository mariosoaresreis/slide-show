name: Build · Test · Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION:     us-central1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE:      us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bumble-bff/api

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bumble_bff_test
          POSTGRES_USER: bumble
          POSTGRES_PASSWORD: bumble
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/bumble_bff_test
          DATABASE_USER: bumble
          DATABASE_PASSWORD: bumble
          JWT_SECRET: test-secret-at-least-32-characters-long
        run: ./gradlew test --no-daemon

  # ── Build & Push ─────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # needed for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── Deploy to Dev ────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: build-push
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy Cloud Run (dev)
        run: |
          gcloud run deploy bumble-bff-dev \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --platform managed \
            --quiet

      - name: Print deployed URL
        run: |
          gcloud run services describe bumble-bff-dev \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format='value(status.url)'

  # ── Deploy to Prod (manual approval) ─────────────────────────────────────────
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod          # requires manual approval in GitHub
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT_PROD }}

      - name: Deploy Cloud Run (prod)
        run: |
          gcloud run deploy bumble-bff-prod \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --platform managed \
            --quiet

      - name: Print deployed URL
        run: |
          gcloud run services describe bumble-bff-prod \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format='value(status.url)'
